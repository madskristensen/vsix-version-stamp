# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: 'Set VSIX Version'
description: 'Increments the VSIX build version or sets it to a specified version. Works on Linux and Windows.'
branding:
  icon: copy
  color: purple

inputs:
  manifest-file:
    description: 'Path to source.extension.vsixmanifest'
    required: true
  vsix-token-source-file:
    description: 'Path to source.extension.cs for version token replacement'
    required: false
    default: ''
  version-number:
    description: 'Explicit version to set (e.g. 2.1.0). If omitted, the build number is stamped into the third segment.'
    required: false
    default: ''
  build-number:
    description: 'Build number to stamp into the third version segment'
    required: false
    default: ${{ github.run_number }}

outputs:
  version-number:
    description: 'The resulting version number'
    value: ${{ steps.stamp.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Stamp version
      id: stamp
      shell: python3 {0}
      env:
        MANIFEST_FILE: ${{ inputs.manifest-file }}
        TOKEN_FILE: ${{ inputs.vsix-token-source-file }}
        VERSION_NUMBER: ${{ inputs.version-number }}
        BUILD_NUMBER: ${{ inputs.build-number }}
      run: |
        import os, re, sys

        manifest = os.environ["MANIFEST_FILE"]
        token_file = os.environ.get("TOKEN_FILE", "").strip()
        version_number = os.environ.get("VERSION_NUMBER", "").strip()
        build_number = os.environ.get("BUILD_NUMBER", "").strip()

        # Validate inputs up front so users get a clear error instead of an
        # unhelpful Python traceback.
        if not os.path.isfile(manifest):
            print(f"::error::manifest-file not found: {manifest}", file=sys.stderr)
            sys.exit(1)
        if token_file and not os.path.isfile(token_file):
            print(f"::error::vsix-token-source-file not found: {token_file}", file=sys.stderr)
            sys.exit(1)

        # Read and update version in vsixmanifest
        text = open(manifest, encoding="utf-8").read()
        # Target the Version attribute inside the <Identity> element specifically
        m = re.search(r'(<Identity\b[^>]*\bVersion=")([^"]+)(")', text)
        if not m:
            print("::error::Could not find Identity Version attribute in manifest", file=sys.stderr)
            sys.exit(1)

        current = m.group(2)
        parts = current.split(".")
        while len(parts) < 3:
            parts.append("0")

        if version_number:
            new_version = version_number
        else:
            parts[2] = build_number
            new_version = ".".join(parts[:3])

        text = text[:m.start(2)] + new_version + text[m.end(2):]
        open(manifest, "w", encoding="utf-8").write(text)
        print(f"Stamped {manifest}: {current} -> {new_version}")

        # Write to GITHUB_OUTPUT
        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"version={new_version}\n")

        # Token replacement in source.extension.cs
        token_replaced = False
        if token_file:
            cs = open(token_file, encoding="utf-8").read()
            cs_new, count = re.subn(r'(?<=\bVersion = ")[^"]+(?=")', new_version, cs)
            if count == 0:
                print(f"::warning::No 'Version = \"...\"' token found in {token_file}; file left unchanged")
            else:
                open(token_file, "w", encoding="utf-8").write(cs_new)
                token_replaced = True
                print(f"Replaced version token in {token_file} ({count} occurrence(s))")

        # Best-effort step summary; never fail the step if writing fails.
        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
        if summary_path:
            try:
                with open(summary_path, "a", encoding="utf-8") as f:
                    f.write("# VSIX version stamped\n\n")
                    f.write(f"`{current}` -> **`{new_version}`**\n\n")
                    f.write("<details><summary>Files updated</summary>\n\n")
                    f.write(f"- `{manifest}`\n")
                    if token_replaced:
                        f.write(f"- `{token_file}`\n")
                    f.write("\n</details>\n")
            except Exception as e:
                print(f"::warning::Failed to write step summary: {e}")